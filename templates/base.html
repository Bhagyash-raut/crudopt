<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Data CRUD App{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background: #111827;
      color: white;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      color: #4f46e5;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 25px;
      margin: 0;
    }

    .nav-links li {
      display: inline;
    }

    .nav-links a {
      text-decoration: none;
      color: #e5e7eb;
      font-size: 15px;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: #4f46e5;
    }

    .active {
      color: #4f46e5;
      font-weight: bold;
    }

    /* MAIN CONTENT */
    main {
      padding: 20px;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 15px;
      background: #111827;
      color: #9ca3af;
      margin-top: 40px;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">CRUD App</div>

    <ul class="nav-links">
      <li>
        <a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a>
      </li>
      <li>
        <a href="/admin" class="{% if 'admin' in request.path %}active{% endif %}">
          Admin
        </a>
      </li>
    </ul>
  </nav>

  <!-- MAIN CONTENT -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Data CRUD App | Built with Flask</p>
  </footer>

</body>
</html>
