{% extends 'base.html' %}

{% block content %}

<style>
.login-wrapper {
  height: 80vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(120deg, #4f46e5, #06b6d4);
}

.login-card {
  background: white;
  padding: 40px;
  width: 350px;
  border-radius: 12px;
  box-shadow: 0px 8px 25px rgba(0,0,0,0.2);
  text-align: center;
}

.login-card h2 {
  margin-bottom: 20px;
}

.form-group {
  margin-bottom: 15px;
  text-align: left;
}

.form-group input {
  width: 100%;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
}

.form-group input:focus {
  outline: none;
  border-color: #4f46e5;
}

.login-btn {
  width: 100%;
  padding: 12px;
  background: #4f46e5;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.login-btn:hover {
  background: #4338ca;
}

.error-box {
  margin-top: 15px;
  color: #ef4444;
  font-size: 14px;
}
</style>

<div class="login-wrapper">

  <div class="login-card">
    <h2>Admin Login</h2>

    <form method="POST">

      <div class="form-group">
        <input type="text" name="username" placeholder="Enter Username" required>
      </div>

      <div class="form-group">
        <input type="password" name="password" placeholder="Enter Password" required>
      </div>

      <button type="submit" class="login-btn">Login</button>

    </form>

    {% if error %}
      <div class="error-box">{{ error }}</div>
    {% endif %}

  </div>

</div>

{% endblock %}
